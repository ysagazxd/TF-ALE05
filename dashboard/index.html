<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Monitoramento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Dashboard de Monitoramento</h1>
            <span class="last-update">Última atualização: <span id="last-update">--</span></span>
            <div class="status-overview">
                <div class="status-card" id="overall-status">
                    <h3>Status Geral</h3>
                    <span class="status-indicator" id="overall-dot">●</span>
                    <span class="status-text" id="overall-text">Carregando...</span>
                </div>
            </div>
        </header>

        <main>
            <section class="services-grid">
                <div class="service-card" id="card-frontend">
                    <h3>Frontend</h3>
                    <div class="metrics">
                        <span class="metric"><label>Uptime:</label><span id="frontend-uptime">--</span></span>
                        <span class="metric"><label>Response Time:</label><span id="frontend-response">--</span></span>
                    </div>
                    <div class="status-indicator" id="dot-frontend">●</div>
                </div>
                <div class="service-card" id="card-backend">
                    <h3>Backend API</h3>
                    <div class="metrics">
                        <span class="metric"><label>Uptime:</label><span id="backend-uptime">--</span></span>
                        <span class="metric"><label>Response Time:</label><span id="backend-response">--</span></span>
                    </div>
                    <div class="status-indicator" id="dot-backend">●</div>
                </div>
                <div class="service-card" id="card-database">
                    <h3>Database</h3>
                    <div class="metrics">
                        <span class="metric"><label>Uptime:</label><span id="database-uptime">--</span></span>
                        <span class="metric"><label>Connections:</label><span id="database-connections">--</span></span>
                    </div>
                    <div class="status-indicator" id="dot-database">●</div>
                </div>
                <div class="service-card" id="card-redis">
                    <h3>Redis Cache</h3>
                    <div class="metrics">
                        <span class="metric"><label>Uptime:</label><span id="redis-uptime">--</span></span>
                        <span class="metric"><label>Response Time:</label><span id="redis-response">--</span></span>
                    </div>
                    <div class="status-indicator" id="dot-redis">●</div>
                </div>
            </section>

            <section class="charts-section">
                <div class="chart-container">
                    <h3>Response Time (últimas 24h)</h3>
                    <canvas id="responseTimeChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Uptime por Serviço</h3>
                    <canvas id="uptimeChart"></canvas>
                </div>
            </section>

            <section class="alerts-section">
                <h3>Alertas Recentes</h3>
                <div class="alerts-list" id="alerts-list">
                    <p class="no-alerts">Carregando alertas...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="js/charts.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
