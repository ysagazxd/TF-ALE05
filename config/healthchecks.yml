healthchecks:
  web-frontend:
    type: http
    url: http://dashboard:80/index.html
    interval: 30s
    timeout: 10s
    retries: 3
    expected_status: 200

  api-backend:
    type: http
    url: http://localhost:5000/health
    interval: 15s
    timeout: 5s
    retries: 2
    expected_status: 200

  database:
    type: database
    connection: "mysql://appuser:apppass@db:3306/monitoring"
    query: "SELECT 1"
    interval: 60s
    timeout: 30s
    retries: 5

  redis-cache:
    type: tcp
    host: redis
    port: 6379
    interval: 30s
    timeout: 5s
    retries: 3
